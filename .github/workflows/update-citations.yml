name: Update Citation Counts

on:
  # Run every day at 06:00 UTC (14:00 CST)
  schedule:
    - cron: "0 6 * * *"
  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  update-citations:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit and push index.html

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch citations and update HTML
        run: python scripts/update_citations.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # Only commit when index.html was actually modified
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update citation counts [skip ci]"
            git push
          fi
